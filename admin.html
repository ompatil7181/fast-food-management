<!DOCTYPE html>
<html>
<head>
  <title>Admin Panel</title>
  <link rel="stylesheet" href="css/style.css">
</head>

<body>

<div class="container" style="margin-top:50px;">
  <h2>📊 Orders Dashboard</h2>

  <button onclick="loadOrders()" class="main-btn mt-3">
    Load Orders
  </button>

  <div id="orders" style="margin-top:20px;"></div>
  <button onclick="loadUsers()" class="main-btn mt-3">
  Load Users
</button>

<div id="users" style="margin-top:20px;"></div>
</div>

<script>
function loadOrders() {
  fetch("http://localhost:5000/orders")
    .then(res => res.json())
    .then(data => {
      let html = "";

      data.forEach(order => {
        html += `
          <div style="border:1px solid #ccc; margin:10px; padding:10px;">
            <p><b>Email:</b> ${order.email}</p>
            <p><b>Total:</b> ₹${order.total}</p>
            <p><b>Date:</b> ${new Date(order.date).toLocaleString()}</p>
          </div>
        `;
      });

      document.getElementById("orders").innerHTML = html;
    });
}

function loadUsers() {
  fetch("http://localhost:5000/users")
    .then(res => res.json())
    .then(data => {
      let html = "";

      data.forEach(user => {
        html += `<p>${user.email}</p>`;
      });

      document.getElementById("users").innerHTML = html;
    });
}
</script>

</body>
</html>
